name: tilbud

on:
  schedule:
    - cron: "10 9 * * *"
  workflow_dispatch:         # så du selv kan trykke "Run"
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python main.py
      - name: Gem resultat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "Opdater tilbud [skip ci]" || echo "intet nyt"
          git push
