<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilbud — bedste pris pr. liter/kg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#F4F1EA;--paper-2:#FBFAF6;--ink:#1C1B17;--stone:#857F72;--line:rgba(28,27,23,.14);--accent:#7A2C39}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.45;font-size:15px}
header{border-bottom:1px solid var(--line)}
.bar{max-width:1120px;margin:0 auto;padding:16px 24px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;text-indent:.3em}
.sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);flex:1}
.updated{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone)}
main{max-width:1120px;margin:0 auto;padding:26px 24px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px 26px}
.card{padding:6px 0 14px;opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
@keyframes rise{to{opacity:1;transform:none}}
.chead{display:flex;align-items:baseline;gap:10px;padding:8px 2px 10px;border-bottom:1px solid var(--ink)}
.cidx{font-family:'Cormorant Garamond',serif;color:var(--accent);font-size:.85rem;font-weight:600}
.chead h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.3rem;text-transform:capitalize;flex:1;line-height:1}
.ccount{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone)}
.offers{list-style:none}
.offer+.offer{border-top:1px solid var(--line)}
.offer a{display:flex;align-items:center;gap:12px;padding:9px 2px;text-decoration:none;color:inherit;transition:background .2s}
.offer a:hover{background:var(--paper-2)}
.rank{font-size:.72rem;color:var(--stone);width:14px;flex-shrink:0;text-align:center}
.info{flex:1;min-width:0}
.info .t{display:block;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info .m{display:block;font-size:.7rem;color:var(--stone);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nums{text-align:right;flex-shrink:0;white-space:nowrap}
.up{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.05rem;line-height:1.1;transition:color .2s}
.offer a:hover .up{color:var(--accent)}
.tot{display:block;font-size:.66rem;color:var(--stone);margin-top:2px}
.empty{padding:10px 2px;color:var(--stone);font-style:italic;font-size:.82rem}
.state{padding:70px 0;text-align:center;color:var(--stone);grid-column:1/-1}
footer{border-top:1px solid var(--line)}
footer .inner{max-width:1120px;margin:0 auto;padding:26px 24px 44px}
footer p{font-size:.72rem;color:var(--stone)}
footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
@media(max-width:520px){.sub{display:none}.grid{gap:10px}}
</style>
</head>
<body>
<header><div class="bar">
  <span class="brand">Tilbud</span>
  <span class="sub">Sorteret efter pris pr. liter/kg · opdateres dagligt kl. 07</span>
  <span class="updated" id="updated"></span>
</div></header>
<main><div id="content" class="grid"><p class="state">Indlæser…</p></div></main>
<footer><div class="inner">
  <p>Data hentet fra <a href="https://www.tilbudsugen.dk" target="_blank" rel="noopener">tilbudsugen.dk</a>. Priser og gyldighed kan ændre sig — det er altid butikkens avis, der gælder.</p>
</div></footer>
<script>
const num = (n)=> n==null?'' : n.toLocaleString('da-DK',{minimumFractionDigits:2,maximumFractionDigits:2});
const kr  = (n)=> n==null?'' : num(n)+' kr';
const cleanDates = (d)=> d ? d.replace(/\s*-\s*/,'–') : '';

function offerRow(o,i){
  const hasUnit = o.unit_price!=null;
  const big = hasUnit ? `${num(o.unit_price)} kr/${o.unit_base||'enhed'}` : kr(o.price);
  const small = hasUnit ? `${kr(o.price)}${o.size?' · '+o.size:''}` : (o.size||'');
  const meta = [o.store, cleanDates(o.dates)].filter(Boolean).join(' · ');
  return `<li class="offer"><a href="${o.link}" target="_blank" rel="noopener">
    <span class="rank">${i+1}</span>
    <span class="info"><span class="t">${o.title??''}</span><span class="m">${meta}</span></span>
    <span class="nums"><span class="up">${big}</span><span class="tot">${small}</span></span>
  </a></li>`;
}

function productBlock(p,i){
  const idx=String(i+1).padStart(2,'0');
  const body = p.offers&&p.offers.length
    ? `<ol class="offers">${p.offers.map((o,j)=>offerRow(o,j)).join('')}</ol>`
    : `<p class="empty">Ingen tilbud fundet.</p>`;
  return `<section class="card" style="animation-delay:${i*0.04}s">
    <div class="chead"><span class="cidx">${idx}</span><h2>${p.query}</h2><span class="ccount">${p.count}</span></div>
    ${body}</section>`;
}

async function load(){
  const content=document.getElementById('content');
  try{
    const res=await fetch('data.json?v='+Date.now(),{cache:'no-cache'});
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(data.generated_at){
      const dt=new Date(data.generated_at);
      document.getElementById('updated').textContent='Opdateret '+
        dt.toLocaleString('da-DK',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
    }
    const products=data.products||[];
    content.innerHTML=products.length
      ? products.map(productBlock).join('')
      : '<p class="state">Ingen produkter konfigureret endnu.</p>';
  }catch(e){
    content.innerHTML='<p class="state">Kunne ikke indlæse tilbud lige nu.</p>';
  }
}
load();
</script>
</body>
</html>
