<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilbud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0F4F8;
  --card:#FFFFFF;
  --ink:#0D1B2A;
  --stone:#7A8FA0;
  --line:rgba(13,27,42,.11);
  --blue:#1B58D0;
  --blue-faint:rgba(27,88,208,.05);
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}

header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.bar{max-width:1160px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;gap:20px}
.brand{font-size:.78rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;white-space:nowrap}
.bar-sub{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);flex:1}
#updated{font-size:.66rem;letter-spacing:.08em;color:var(--stone);white-space:nowrap}

main{max-width:1160px;margin:0 auto;padding:20px 24px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;
  opacity:0;transform:translateY(6px);animation:in .45s ease forwards}
@keyframes in{to{opacity:1;transform:none}}

.chead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.cidx{font-size:.68rem;font-weight:600;letter-spacing:.1em;color:var(--blue);min-width:20px}
.chead h2{font-size:.92rem;font-weight:600;text-transform:capitalize;flex:1}
.ccount{font-size:.64rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--stone)}

.offers{list-style:none}
.offer+.offer{border-top:1px solid var(--line)}
.offer a{display:flex;align-items:center;gap:10px;padding:9px 16px;
  text-decoration:none;color:inherit;transition:background .15s}
.offer a:hover{background:var(--blue-faint)}
.rank{font-size:.68rem;font-weight:500;color:var(--stone);width:14px;text-align:center;flex-shrink:0}
.info{flex:1;min-width:0}
.t{display:block;font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m{display:block;font-size:.7rem;color:var(--stone);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:1px}
.nums{text-align:right;flex-shrink:0;white-space:nowrap}
.up{display:block;font-size:.95rem;font-weight:600;color:var(--blue);line-height:1.2}
.tot{display:block;font-size:.68rem;color:var(--stone);margin-top:2px}
.empty{padding:10px 16px;font-size:.8rem;color:var(--stone);font-style:italic}
.state{padding:80px 0;text-align:center;font-size:.85rem;color:var(--stone);grid-column:1/-1}

footer{border-top:1px solid var(--line);margin-top:4px}
.foot{max-width:1160px;margin:0 auto;padding:20px 24px 44px}
footer p{font-size:.7rem;color:var(--stone)}
footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}

@media(max-width:560px){
  .bar-sub{display:none}
  .bar{padding:0 16px}
  main{padding:14px 12px 40px}
  .grid{gap:8px}
}
</style>
</head>
<body>
<header><div class="bar">
  <span class="brand">Tilbud</span>
  <span class="bar-sub">Sorteret efter pris pr. liter/kg &middot; opdateres dagligt kl. 07</span>
  <span id="updated"></span>
</div></header>
<main><div id="content" class="grid"><p class="state">Indlæser&hellip;</p></div></main>
<footer><div class="foot">
  <p>Data hentet fra <a href="https://www.tilbudsugen.dk" target="_blank" rel="noopener">tilbudsugen.dk</a>. Priser og gyldighed kan ændre sig &mdash; det er altid butikkens avis, der gælder.</p>
</div></footer>
<script>
const num = n => n==null?'':n.toLocaleString('da-DK',{minimumFractionDigits:2,maximumFractionDigits:2});
const kr  = n => n==null?'':num(n)+' kr';
const dates = d => d?d.replace(/\s*-\s*/,'–'):'';

function row(o,i){
  const hasU = o.unit_price!=null;
  const big  = hasU?`${num(o.unit_price)} kr/${o.unit_base||'enhed'}`:kr(o.price);
  const sml  = hasU?`${kr(o.price)}${o.size?' · '+o.size:''}`:o.size||'';
  const meta = [o.store,dates(o.dates)].filter(Boolean).join(' · ');
  return `<li class="offer"><a href="${o.link}" target="_blank" rel="noopener">
    <span class="rank">${i+1}</span>
    <span class="info"><span class="t">${o.title??''}</span><span class="m">${meta}</span></span>
    <span class="nums"><span class="up">${big}</span><span class="tot">${sml}</span></span>
  </a></li>`;
}

function card(p,i){
  const idx  = String(i+1).padStart(2,'0');
  const body = p.offers?.length
    ? `<ol class="offers">${p.offers.map((o,j)=>row(o,j)).join('')}</ol>`
    : `<p class="empty">Ingen tilbud fundet denne uge.</p>`;
  return `<section class="card" style="animation-delay:${i*0.04}s">
    <div class="chead"><span class="cidx">${idx}</span><h2>${p.query}</h2><span class="ccount">${p.count}</span></div>
    ${body}</section>`;
}

async function load(){
  const el = document.getElementById('content');
  try{
    const r = await fetch('data.json?v='+Date.now(),{cache:'no-cache'});
    if(!r.ok) throw 0;
    const d = await r.json();
    if(d.generated_at){
      const dt = new Date(d.generated_at);
      document.getElementById('updated').textContent =
        'Opdateret '+dt.toLocaleString('da-DK',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
    }
    const ps = d.products||[];
    el.innerHTML = ps.length ? ps.map(card).join('') : '<p class="state">Ingen produkter konfigureret endnu.</p>';
  }catch{
    el.innerHTML = '<p class="state">Kunne ikke indlæse tilbud.</p>';
  }
}
load();
</script>
</body>
</html>
